name = "babula-shared"
main = "babula-shared.mjs"
compatibility_date = "2026-05-10"

# Routes will be configured AFTER DNS migration to Cloudflare.
# When the zone `babulashotsrd.com` is on this CF account, uncomment:
#
# [[routes]]
# pattern = "babulashotsrd.com/*"
# zone_name = "babulashotsrd.com"
#
# [[routes]]
# pattern = "*.babulashotsrd.com/*"
# zone_name = "babulashotsrd.com"
#
# [[routes]]
# pattern = "babulashotsrd.com/api/*"
# zone_name = "babulashotsrd.com"

# Worker reads underlying Pages project as ASSETS binding (set after deploy):
# [[assets]]
# directory = "out"

[observability]
enabled = true
